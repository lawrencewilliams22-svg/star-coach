<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR Method Interview Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0e0e10;color:#e8e8e8;font-family:'Outfit',system-ui,sans-serif;padding:20px 14px}
.wrap{max-width:740px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.logo{font-size:22px;font-weight:800;letter-spacing:.15em;font-family:'JetBrains Mono',monospace}
.logo em{font-style:normal;font-weight:400;font-size:15px;color:#2A7D6C;margin-left:4px;letter-spacing:.05em}
.counter{font-size:11px;font-weight:600;color:#2A7D6C;background:#2A7D6C16;padding:4px 12px;border-radius:16px;border:1px solid #2A7D6C30}

.q-card{background:#18181c;border:1px solid #252528;border-radius:14px;padding:20px 24px;margin-bottom:16px;animation:fadeUp .45s cubic-bezier(.22,1,.36,1)}
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cat-pill{font-size:11px;font-weight:600;color:#aaa;background:#ffffff08;padding:4px 11px;border-radius:16px;border:1px solid #ffffff10}
.skip-btn{font-size:11px;font-weight:600;color:#777;background:0;border:1px solid #333;border-radius:16px;padding:4px 13px;cursor:pointer;font-family:'Outfit',system-ui,sans-serif}
.skip-btn:hover{color:#bbb;border-color:#555}
.q-text{font-size:18px;font-weight:500;line-height:1.5;color:#f0f0f0;font-style:italic}

.q-mini{background:#18181c;border:1px solid #252528;border-radius:12px;padding:14px 20px;margin-bottom:16px}
.q-mini p{font-size:15px;font-style:italic;color:#ccc;line-height:1.45;margin-top:8px}

.prog{display:flex;gap:6px;margin-bottom:16px}
.prog-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border-radius:10px;border:1.5px solid #252528;background:0;cursor:pointer;transition:all .25s;font-family:'Outfit',system-ui,sans-serif}

.prog-label{font-size:10px;font-weight:500;letter-spacing:.02em;transition:color .25s}

.in-card{background:#18181c;border:1.5px solid #252528;border-radius:14px;padding:20px 24px;margin-bottom:14px;transition:border-color .3s}
.in-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.in-title-row{display:flex;align-items:center;gap:10px}

.in-title{font-size:19px;font-weight:700}
.tip-btn{font-size:11px;font-weight:600;padding:4px 13px;border-radius:16px;border:1px solid #333;cursor:pointer;background:0;transition:all .2s;font-family:'Outfit',system-ui,sans-serif}
.in-prompt{font-size:13px;color:#999;line-height:1.55;margin-bottom:12px}

textarea{width:100%;background:#0e0e10;border:1px solid #252528;border-radius:10px;padding:14px;font-size:14px;line-height:1.65;color:#e8e8e8;resize:vertical;outline:0;font-family:'Outfit',system-ui,sans-serif;min-height:110px}

.in-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px}

button{font-family:'Outfit',system-ui,sans-serif}

.fb-card{background:#18181c;border:1px solid #252528;border-radius:14px;padding:24px;animation:fadeUp .35s ease}
.fb-top{display:flex;align-items:center;gap:20px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid #1f1f22}

.fb-sect{padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid #1f1f22}
.fb-sect:last-child{border-bottom:0;margin-bottom:0;padding-bottom:0}
.fb-sect-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fb-sect-hdr .label{font-size:13px;font-weight:700;color:#ddd}
.fb-sect-hdr .score{font-size:12px;font-weight:700;margin-left:auto;font-family:'JetBrains Mono',monospace}
.fb-you{font-size:12px;color:#777;line-height:1.5;margin-bottom:6px;padding-left:34px;font-style:italic;white-space:pre-wrap}
.fb-comment{font-size:13px;color:#bbb;line-height:1.55;padding-left:34px}

.coaching-box{border-radius:10px;padding:16px 18px;margin-top:20px;margin-bottom:12px}
.coaching-box h3{font-size:13px;font-weight:700;margin-bottom:8px}
.coaching-box p,.coaching-box li{font-size:13px;color:#bbb;line-height:1.6}
.coaching-box ul{padding-left:18px;margin-top:6px}
.coaching-box li{margin-bottom:4px}
.improved{background:#0e1a14;border:1px solid #2A7D6C30}
.improved h3{color:#2A7D6C}
.tip-box2{background:#1a1610;border:1px solid #C49A2A30}
.tip-box2 h3{color:#C49A2A}
.next-steps{background:#141018;border:1px solid #7C5CBF30}
.next-steps h3{color:#9B7ED8}

.letter{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;flex-shrink:0}

.loading-bar{height:3px;background:linear-gradient(90deg,#D94F3000,#D94F30,#C49A2A,#2A7D6C,#1B5E8A,#D94F3000);background-size:200% 100%;animation:shimmer 1.5s linear infinite;border-radius:4px;margin-bottom:20px}

@media(max-width:500px){
  .q-text{font-size:16px}
  .prog-step{padding:8px 4px}
  .in-card{padding:16px 18px}
  .fb-top{flex-direction:column;text-align:center}
  .strengths{justify-content:center}
}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const QUESTIONS=[
{cat:"Teamwork",q:"Tell me about a time you had to work closely with someone whose personality was very different from yours."},
{cat:"Problem Solving",q:"Describe a situation where you had to solve a problem with limited information or resources."},
{cat:"Leadership",q:"Give me an example of a time you took the initiative on a project or task without being asked."},
{cat:"Adaptability",q:"Tell me about a time when you had to adapt to a significant change at work or school."},
{cat:"Conflict",q:"Describe a disagreement you had with a coworker, classmate, or supervisor. How did you handle it?"},
{cat:"Failure",q:"Tell me about a time you made a mistake. What did you do to fix it?"},
{cat:"Communication",q:"Give an example of a time you had to explain something complex to someone unfamiliar with the topic."},
{cat:"Time Management",q:"Describe a time you had to juggle multiple priorities with tight deadlines."},
{cat:"Customer Service",q:"Tell me about a time you went above and beyond to help someone."},
{cat:"Creativity",q:"Describe a situation where you came up with a new or unconventional approach to solve a problem."},
{cat:"Pressure",q:"Tell me about a time you had to perform well under significant pressure."},
{cat:"Growth",q:"Give an example of a skill you taught yourself. What motivated you and how did you go about it?"},
{cat:"Teamwork",q:"Tell me about a time a group project didn't go as planned. What role did you play in getting it back on track?"},
{cat:"Accountability",q:"Describe a situation where you had to own up to something that went wrong."},
{cat:"Problem Solving",q:"Tell me about a time you identified a problem before it became urgent. What did you do?"},
{cat:"Adaptability",q:"Give an example of a time you had to learn something new very quickly to accomplish a goal."},
{cat:"Leadership",q:"Describe a time you motivated others to complete a task or reach a goal."},
{cat:"Communication",q:"Tell me about a time you had to deliver difficult news or feedback to someone."},
];

const STEPS=[
{key:"situation",letter:"S",label:"Situation",color:"#D94F30",prompt:"Set the scene. Where were you? What was happening?",ph:"During my junior year, our group project partner dropped the class two days before a major presentation...",tip:"Keep it to 1–2 sentences. Just enough context for the interviewer to follow."},
{key:"task",letter:"T",label:"Task",color:"#C49A2A",prompt:"What was YOUR specific responsibility or challenge?",ph:"I needed to take over their section on market analysis while still completing my own research portion...",tip:"Focus on YOUR role. What was specifically on your shoulders?"},
{key:"action",letter:"A",label:"Action",color:"#2A7D6C",prompt:"What did YOU do? Walk through the specific steps you took.",ph:"I reorganized our timeline, divided the dropped section into smaller tasks, scheduled two extra team meetings...",tip:"Use 'I' not 'we.' Be specific about YOUR individual actions."},
{key:"result",letter:"R",label:"Result",color:"#1B5E8A",prompt:"What was the outcome? Quantify if possible. What did you learn?",ph:"We delivered on time and received an A-. The professor praised the depth of analysis. I learned that proactive communication...",tip:"Numbers make results memorable. Even approximate figures beat vague outcomes."},
];

const ICONS={"Teamwork":"👥","Problem Solving":"🧩","Leadership":"🚀","Adaptability":"🔄","Conflict":"⚡","Failure":"📈","Communication":"💬","Time Management":"⏰","Customer Service":"🤝","Creativity":"💡","Pressure":"🎯","Growth":"🌱","Accountability":"✊"};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function wc(s){return s.trim()?s.trim().split(/\s+/).length:0;}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function scoreColor(s){return s>=8?"#2A7D6C":s>=6?"#C49A2A":"#D94F30";}
function scoreLabel(s){return s>=8?"Strong":s>=6?"Getting There":"Needs Work";}

// ═══════════════════════════════════════════
// BUILT-IN COACHING ENGINE (no API needed)
// ═══════════════════════════════════════════
function evaluate(question, answers) {
  const s = answers.situation.trim();
  const t = answers.task.trim();
  const a = answers.action.trim();
  const r = answers.result.trim();
  const sW = wc(s), tW = wc(t), aW = wc(a), rW = wc(r);

  // --- Utility detectors ---
  const hasI = (txt) => /\bI\b/.test(txt);
  const hasWe = (txt) => /\bwe\b/i.test(txt);
  const hasNumbers = (txt) => /\d+/.test(txt) || /percent|%|half|double|triple|twice|increased|decreased|reduced|improved|saved/i.test(txt);
  const hasSpecifics = (txt) => /\b(because|by|so that|in order to|which led to|resulting in|as a result)\b/i.test(txt);
  const hasLearning = (txt) => /\b(learn|taught|realize|understand|going forward|from then on|now I|changed my|grew|improved|take away|takeaway)\b/i.test(txt);
  const hasContext = (txt) => /\b(at|during|when|while|in my|at my|last year|semester|summer|job|class|school|work|team|project|company|store|restaurant|shift)\b/i.test(txt);
  const hasActionVerbs = (txt) => /\b(created|built|organized|led|managed|coordinated|reached out|contacted|scheduled|decided|implemented|resolved|proposed|initiated|designed|developed|researched|analyzed|presented|trained|delegated|prioritized|streamlined|volunteered|negotiated|adapted|communicated)\b/i.test(txt);
  const sentenceCount = (txt) => txt.split(/[.!?]+/).filter(x => x.trim().length > 5).length;

  // --- SITUATION scoring ---
  let sScore = 1, sComment = "";
  if (sW === 0) { sScore = 1; sComment = "This section was left blank. The Situation sets the stage — without it, the interviewer has no context for your story. Try starting with where you were and what was happening."; }
  else if (sW < 5) { sScore = 2; sComment = "This is very brief. Add a bit more context — where were you, when did this happen, and what was going on? One to two full sentences is the sweet spot."; }
  else {
    sScore = 4;
    if (hasContext(s)) { sScore += 2; sComment = "Good — you included context that helps the interviewer picture the scene. "; }
    else { sComment = "Try grounding this with a specific setting — mention when and where this happened. "; }
    if (sentenceCount(s) >= 1 && sentenceCount(s) <= 3) { sScore += 1; sComment += "Nice length — concise but clear. "; }
    else if (sentenceCount(s) > 3) { sScore -= 1; sComment += "This might be a little long for the Situation. Try to set the scene in 1–2 sentences so you save time for the Action. "; }
    if (sW >= 10 && sW <= 40) sScore += 1;
    if (sW > 60) { sScore -= 1; sComment += "Consider trimming this down — the Situation should be brief context, not the main event. "; }
    sScore = Math.min(10, Math.max(1, sScore));
  }

  // --- TASK scoring ---
  let tScore = 1, tComment = "";
  if (tW === 0) { tScore = 1; tComment = "This section was left blank. The Task is where you clarify YOUR specific responsibility. What was on your shoulders? What needed to happen?"; }
  else if (tW < 5) { tScore = 2; tComment = "This needs more detail. What specifically was your responsibility or challenge? Make it clear what was expected of YOU."; }
  else {
    tScore = 4;
    if (hasI(t)) { tScore += 2; tComment = "Good use of 'I' — it's clear this was your responsibility. "; }
    else if (hasWe(t)) { tScore += 1; tComment = "You used 'we' here. Try to reframe with 'I' — interviewers want to know YOUR specific role, not the team's. "; }
    else { tComment = "Make sure to clarify that this was YOUR task. Starting with 'I needed to...' or 'My responsibility was...' helps. "; }
    if (tW >= 10 && tW <= 35) { tScore += 1; tComment += "Good length for a Task section. "; }
    if (tW > 50) { tScore -= 1; tComment += "This is running a bit long. The Task should be 1–2 sentences max. "; }
    tScore = Math.min(10, Math.max(1, tScore));
  }

  // --- ACTION scoring (most important) ---
  let aScore = 1, aComment = "";
  if (aW === 0) { aScore = 1; aComment = "This section was left blank. The Action is the most important part of your answer — it's where you show what YOU actually did. Walk through your steps one by one."; }
  else if (aW < 8) { aScore = 2; aComment = "This needs significantly more detail. The Action is the heart of your answer. Describe the specific steps you took — the more concrete, the better."; }
  else {
    aScore = 3;
    if (hasI(a)) { aScore += 2; aComment = "Great — you're using 'I' to own your actions. "; }
    else if (hasWe(a) && !hasI(a)) { aScore += 1; aComment = "You used 'we' but not 'I' — even in team situations, focus on YOUR individual contributions. What did YOU specifically do? "; }
    else { aComment = "Try to use 'I' more explicitly so the interviewer knows exactly what YOU did. "; }
    if (hasActionVerbs(a)) { aScore += 1; aComment += "Nice use of strong action verbs. "; }
    else { aComment += "Try using stronger action verbs (organized, led, created, resolved, coordinated) to make your actions more vivid. "; }
    if (hasSpecifics(a)) { aScore += 1; aComment += "Good — you included specifics about how or why you took those steps. "; }
    if (aW >= 25) { aScore += 1; aComment += "Good level of detail. "; }
    if (aW >= 40 && aW <= 100) { aScore += 1; }
    if (aW > 120) { aScore -= 1; aComment += "This is quite long. In a real interview, aim for 30–60 seconds on the Action. Tighten to your most impactful steps. "; }
    aScore = Math.min(10, Math.max(1, aScore));
  }

  // --- RESULT scoring ---
  let rScore = 1, rComment = "";
  if (rW === 0) { rScore = 1; rComment = "This section was left blank. Always include a result — even if the outcome wasn't perfect. Interviewers want to see impact and self-awareness."; }
  else if (rW < 5) { rScore = 2; rComment = "This is very brief. What actually happened? Try to include a concrete outcome and what you learned from the experience."; }
  else {
    rScore = 3;
    if (hasNumbers(r)) { rScore += 3; rComment = "Excellent — you quantified your result. Numbers make your impact tangible and memorable. "; }
    else { rScore += 1; rComment = "Try to add a number or measurable outcome (even approximate). 'Improved by about 20%' is much stronger than 'it went well.' "; }
    if (hasLearning(r)) { rScore += 2; rComment += "Strong finish — you included a reflection or lesson learned. This shows maturity and self-awareness. "; }
    else { rComment += "Consider adding what you learned or how this experience changed your approach. A brief reflection makes a big difference. "; }
    if (rW >= 15 && rW <= 60) { rScore += 1; }
    if (rW > 80) { rScore -= 1; rComment += "The Result can be concise — 2–3 sentences covering the outcome and your takeaway. "; }
    rScore = Math.min(10, Math.max(1, rScore));
  }

  // --- Overall score ---
  const rawOverall = Math.round((sScore + tScore + aScore * 1.3 + rScore * 1.1) / 4.4 * 10) / 10;
  const overall = Math.min(10, Math.max(1, Math.round(rawOverall)));

  // --- Detect strengths ---
  const strengths = [];
  if (hasI(a) && aW >= 20) strengths.push("Owned your actions with 'I' statements");
  if (hasNumbers(r)) strengths.push("Quantified your results");
  if (hasLearning(r)) strengths.push("Included reflection and growth");
  if (hasContext(s) && sW <= 40) strengths.push("Set the scene concisely");
  if (hasActionVerbs(a)) strengths.push("Used strong action verbs");
  if (hasSpecifics(a)) strengths.push("Provided specific details");
  if (sW > 0 && tW > 0 && aW > 0 && rW > 0) strengths.push("Completed all four STAR sections");
  if (strengths.length === 0 && (sW > 0 || tW > 0 || aW > 0 || rW > 0)) strengths.push("Took the first step — you started practicing");

  // --- Build coaching tips ---
  const tips = [];
  if (!hasI(a) && aW > 0) tips.push("Replace 'we' with 'I' in your Action section — interviewers want YOUR contribution.");
  if (!hasNumbers(r) && rW > 0) tips.push("Add a number to your Result — even an estimate like 'about 30%' or 'saved 2 hours a week' makes it memorable.");
  if (!hasLearning(r) && rW > 0) tips.push("End with a brief lesson learned: 'This taught me that...' — it shows growth and self-awareness.");
  if (sW > 50) tips.push("Trim your Situation to 1–2 sentences. Save the detail for your Action.");
  if (aW > 0 && aW < 20) tips.push("Expand your Action — this is the most important section. Walk through each step you took.");
  if (!hasActionVerbs(a) && aW > 10) tips.push("Use stronger action verbs in your Action section: organized, led, created, resolved, coordinated.");
  if (aW > 0 && !hasSpecifics(a)) tips.push("Add 'because' or 'which led to' in your Action to connect your steps to reasoning.");
  if (tips.length === 0) tips.push("Practice saying this answer out loud in under 2 minutes. Timing yourself builds confidence.");

  // --- Pick one priority tip ---
  const topTip = tips[0];

  // --- Build improved suggestion ---
  let improved = "";
  if (sW > 0 && tW > 0 && aW > 0 && rW > 0) {
    improved = "Here's a tighter structure to aim for: Start with 1–2 sentences of context (your Situation), then one clear sentence about your responsibility (Task). Spend the most time on 3–4 specific Action steps using 'I' and strong verbs. Close with a concrete result — ideally with a number — and one sentence about what you learned. Practice saying it aloud until it flows in about 90 seconds.";
  } else if (sW > 0 || aW > 0) {
    improved = "You've got a good start — now fill in all four sections. Even brief notes for each part of STAR will give your answer structure. Interviewers notice when answers are organized versus when they ramble. The framework is your friend.";
  } else {
    improved = "Start by picking a real story from your life — work, school, volunteering, or even a personal challenge. Then walk through: What was happening? What was your job? What did you do? What happened? That's STAR. Every answer gets better with practice.";
  }

  return {
    overall_score: overall,
    strengths: strengths.slice(0, 3),
    situation_feedback: { score: sScore, comment: sComment.trim() },
    task_feedback: { score: tScore, comment: tComment.trim() },
    action_feedback: { score: aScore, comment: aComment.trim() },
    result_feedback: { score: rScore, comment: rComment.trim() },
    coaching_tips: tips.slice(0, 3),
    top_tip: topTip,
    improved_suggestion: improved,
  };
}

// ═══════════════════════════════════
// APP STATE
// ═══════════════════════════════════
let queue=shuffle(QUESTIONS),qi=0,step=0,ans={situation:"",task:"",action:"",result:""},phase="write",feedback=null,done=0,tipOpen=false;
const app=document.getElementById('app');
const curQ=()=>queue[qi%queue.length];

function render(){
  if(phase==="feedback") return renderFeedback();
  if(phase==="review") return renderReview();
  renderWrite();
}

function renderWrite(){
  const cq=curQ(),cs=STEPS[step],filled=STEPS.filter(s=>ans[s.key].trim()).length;
  app.innerHTML=`
  <div class="hdr"><div class="logo">STAR<em>Coach</em></div><div>${done>0?`<span class="counter">${done} practiced</span>`:''}</div></div>
  <div class="q-card">
    <div class="q-top"><span class="cat-pill">${ICONS[cq.cat]||"📋"} ${cq.cat}</span><button class="skip-btn" onclick="skipQ()">Skip ↻</button></div>
    <div class="q-text">"${esc(cq.q)}"</div>
  </div>
  <div class="prog">
    ${STEPS.map((st,i)=>{
      const active=i===step,has=ans[st.key].trim().length>0;
      return `<button class="prog-step" style="border-color:${active?st.color:has?st.color+'55':'#252528'};background:${active?st.color+'12':'transparent'}" onclick="goStep(${i})">
        <span class="prog-letter" style="background:${active||has?st.color:'#252528'};color:${active||has?'#fff':'#555'};transform:scale(${active?1.12:1})">${has&&!active?'✓':st.letter}</span>
        <span class="prog-label" style="color:${active?st.color:has?'#bbb':'#555'};font-weight:${active?700:500}">${st.label}</span>
      </button>`;
    }).join('')}
  </div>
  <div class="in-card" style="border-color:${cs.color}40">
    <div class="in-hdr">
      <div class="in-title-row">
        <span class="in-letter" style="background:${cs.color}">${cs.letter}</span>
        <h3 class="in-title" style="color:${cs.color}">${cs.label}</h3>
      </div>
      <button class="tip-btn" style="background:${tipOpen?cs.color+'18':'transparent'};color:${tipOpen?cs.color:'#777'};border-color:${tipOpen?cs.color+'40':'#333'}" onclick="toggleTip()">💡 Tip</button>
    </div>
    <p class="in-prompt">${cs.prompt}</p>
    ${tipOpen?`<div class="tip-popup" style="background:${cs.color}0C;border-color:${cs.color}30"><span>💡</span><span>${cs.tip}</span></div>`:''}
    <textarea id="ta" placeholder="${esc(cs.ph)}" oninput="onInput(this.value)" rows="5">${esc(ans[cs.key])}</textarea>
    <div class="in-foot">
      <span class="wc-label">${wc(ans[cs.key])} words${wc(ans[cs.key])>0&&wc(ans[cs.key])<8?' — add more detail':''}${wc(ans[cs.key])>=75?' — consider tightening up':''}</span>
      <div class="nav-btns">
        ${step>0?'<button class="btn-back" onclick="prevStep()">← Back</button>':''}
        <button class="btn-next" style="background:${cs.color};opacity:${ans[cs.key].trim()?1:0.45}" onclick="nextStep()">${step<3?'Next →':'Review & Get Feedback ✓'}</button>
      </div>
    </div>
  </div>
  <p class="footer-hint">Step ${step+1} of 4 · ${filled}/4 filled · Practice makes interviews feel natural</p>`;
  setTimeout(()=>{const ta=document.getElementById('ta');if(ta){ta.focus();ta.selectionStart=ta.value.length;}},50);
}

function renderReview(){
  const cq=curQ();
  app.innerHTML=`
  <div class="hdr"><div class="logo">STAR<em>Coach</em></div></div>
  <div class="q-mini"><span class="cat-pill">${ICONS[cq.cat]||"📋"} ${cq.cat}</span><p>"${esc(cq.q)}"</p></div>
  <div class="rev-card">
    <h2 class="rev-title">Review Your Response</h2>
    <p class="rev-sub">Read through your full answer. When ready, submit for coaching feedback.</p>
    ${STEPS.map(st=>`
      <div class="rev-sect">
        <div class="rev-sect-hdr">
          <span class="letter" style="background:${st.color}">${st.letter}</span>
          <span class="label" style="font-size:13px;font-weight:700;color:#ddd">${st.label}</span>
          <span class="wc">${wc(ans[st.key])} words</span>
        </div>
        <div class="rev-text">${ans[st.key].trim()?esc(ans[st.key]):'<em>No response entered</em>'}</div>
      </div>`).join('')}
  </div>
  <div class="fb-actions">
    <button class="btn-sec" onclick="editResp()">✏️ Edit</button>
    <button class="btn-coach" onclick="runFeedback()">🎤 Get Coaching Feedback</button>
  </div>`;
}

function renderFeedback(){
  const cq=curQ(),fb=feedback;
  const sc=fb.overall_score;
  app.innerHTML=`
  <div class="hdr"><div class="logo">STAR<em>Coach</em></div>${done>0?`<span class="counter">${done} practiced</span>`:''}</div>
  <div class="q-mini"><span class="cat-pill">${ICONS[cq.cat]||"📋"} ${cq.cat}</span><p>"${esc(cq.q)}"</p></div>
  <div class="fb-card">
    <div class="fb-top">
      <div class="score-big" style="border-color:${scoreColor(sc)}">
        <span class="score-num" style="color:${scoreColor(sc)}">${sc}</span><span class="score-of">/10</span>
      </div>
      <div class="fb-top-right">
        <h2 class="fb-title" style="color:${scoreColor(sc)}">${scoreLabel(sc)}</h2>
        <div class="strengths">${fb.strengths.map(s=>`<span class="strength-pill">✓ ${esc(s)}</span>`).join('')}</div>
      </div>
    </div>
    <div>
      ${STEPS.map(st=>{
        const sfb=fb[st.key+'_feedback'];
        return `<div class="fb-sect">
          <div class="fb-sect-hdr">
            <span class="letter" style="background:${st.color}">${st.letter}</span>
            <span class="label">${st.label}</span>
            <span class="score" style="color:${scoreColor(sfb.score)}">${sfb.score}/10</span>
          </div>
          <div class="fb-you">${esc(ans[st.key].trim()||'(left blank)')}</div>
          <div class="fb-comment">${esc(sfb.comment)}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="coaching-box tip-box2">
      <h3>🎯 Your Top Priority</h3>
      <p>${esc(fb.top_tip)}</p>
    </div>

    ${fb.coaching_tips.length>1?`
    <div class="coaching-box next-steps">
      <h3>📋 Additional Coaching Notes</h3>
      <ul>${fb.coaching_tips.slice(1).map(t=>`<li>${esc(t)}</li>`).join('')}</ul>
    </div>`:''}

    <div class="coaching-box improved">
      <h3>💎 How to Level Up</h3>
      <p>${esc(fb.improved_suggestion)}</p>
    </div>
  </div>
  <div class="fb-actions">
    <button class="btn-sec" onclick="editResp()">✏️ Edit & Resubmit</button>
    <button class="btn-pri" onclick="nextQuestion()">Next Question →</button>
  </div>`;
}

// ═══════════════════════
// EVENT HANDLERS
// ═══════════════════════
function onInput(v){ans[STEPS[step].key]=v;}
function goStep(i){step=i;tipOpen=false;render();}
function toggleTip(){tipOpen=!tipOpen;render();}
function nextStep(){if(step<3){step++;tipOpen=false;}else phase="review";render();}
function prevStep(){if(step>0){step--;tipOpen=false;render();}}
function editResp(){phase="write";step=0;feedback=null;render();}
function skipQ(){qi=(qi+1)%queue.length;if(qi===0)queue=shuffle(QUESTIONS);step=0;ans={situation:"",task:"",action:"",result:""};phase="write";feedback=null;tipOpen=false;render();}
function nextQuestion(){done++;qi=(qi+1)%queue.length;if(qi===0)queue=shuffle(QUESTIONS);step=0;ans={situation:"",task:"",action:"",result:""};phase="write";feedback=null;tipOpen=false;render();}

function runFeedback(){
  // Show brief loading state for feel
  app.querySelector('.btn-coach').innerHTML='<span style="display:inline-flex;align-items:center;gap:8px"><span style="display:inline-block;width:16px;height:16px;border:2px solid #ffffff44;border-top:2px solid #fff;border-radius:50%;animation:spin .8s linear infinite"></span>Evaluating...</span>';
  app.querySelector('.btn-coach').disabled=true;
  setTimeout(()=>{
    feedback = evaluate(curQ().q, ans);
    phase = "feedback";
    render();
  }, 800);
}

render();
</script>
</body>
</html>
